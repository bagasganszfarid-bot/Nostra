<style>

@font-face{
    font-family:'Ethnocentric';
    src:url('https://fonts.cdnfonts.com/s/16082/ethnocentric rg.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top,#081425 0%,#020611 45%,#010309 100%);
    
    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:'Orbitron',sans-serif;

    position:relative;
}

/* STAR BACKGROUND */
body::before{
    content:"";

    position:fixed;
    inset:0;

    background-image:
    radial-gradient(rgba(255,255,255,.18) 1px, transparent 1px);

    background-size:38px 38px;

    opacity:.13;

    pointer-events:none;
}

/* CONTAINER */
.container{
    width:100%;
    max-width:430px;

    margin:auto;

    padding:28px 18px 50px;
}

/* TOP CARD */
.top-card{
    width:100%;
    height:250px;

    border-radius:34px;

    position:relative;

    overflow:hidden;

    background:
    linear-gradient(
        145deg,
        #07111f,
        #02060d
    );

    border:1px solid rgba(0,255,255,.08);

    box-shadow:
    0 0 35px rgba(0,170,255,.08),
    inset 0 0 40px rgba(255,255,255,.03);
}

/* ANIMATION */
.top-card::before{
    content:"";

    position:absolute;

    width:220%;
    height:220%;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(0,255,255,.06),
        transparent
    );

    animation:spin 8s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* CENTER */
.center{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* LOGO */
.logo{
    width:95px;
    height:95px;

    border:5px solid #e8edf7;

    border-radius:24px;

    transform:rotate(45deg);

    position:relative;

    margin-bottom:34px;

    box-shadow:
    0 0 14px rgba(255,255,255,.14);
}

.logo::before{
    content:"";

    position:absolute;

    inset:14px;

    border:4px solid #e8edf7;

    border-radius:16px;
}

/* MAIN TOP TITLE */
.big-title{
    font-family:'Ethnocentric',sans-serif;

    font-size:54px;

    color:#f7fbff;

    letter-spacing:2px;

    text-shadow:
    0 0 7px rgba(255,255,255,.7),
    0 0 20px rgba(255,255,255,.25),
    0 0 35px rgba(0,255,255,.18);
}

/* SECOND TITLE */
.main-title{
    text-align:center;

    margin-top:48px;

    font-family:'Ethnocentric',sans-serif;

    font-size:56px;

    letter-spacing:7px;

    color:#ffffff;

    text-shadow:
    0 0 8px rgba(255,255,255,.4),
    0 0 18px rgba(0,255,255,.15);
}

/* SUB TITLE */
.sub{
    text-align:center;

    margin-top:18px;

    color:#00ffe1;

    font-size:12px;

    letter-spacing:11px;

    font-family:'Michroma',sans-serif;

    text-shadow:

<style>

/* =========================
   PERFECT OTAX CARD
========================= */

.card{
    width:100%;

    margin-top:38px;

    padding:38px 24px 34px;

    border-radius:30px;

    position:relative;

    overflow:hidden;

    background:
    linear-gradient(
        145deg,
        rgba(10,18,30,.98),
        rgba(6,12,22,.98)
    );

    border:1px solid rgba(255,255,255,.03);

    box-shadow:
    inset 0 0 24px rgba(255,255,255,.02),
    0 10px 30px rgba(0,0,0,.35);
}

/* GLOW */
.card-glow{
    position:absolute;

    top:-120%;
    left:-35%;

    width:70%;
    height:320%;

    transform:rotate(18deg);

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(0,255,225,.04),
        transparent
    );

    animation:cardMove 5s linear infinite;
}

@keyframes cardMove{
    from{
        left:-60%;
    }
    to{
        left:130%;
    }
}

/* ICON */
.icon-box{
    width:76px;
    height:76px;

    margin:auto;

    border-radius:22px;

    border:2px solid rgba(0,255,225,.32);

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(
        145deg,
        rgba(0,15,25,.95),
        rgba(0,20,30,.95)
    );

    box-shadow:
    0 0 18px rgba(0,255,225,.10),
    inset 0 0 12px rgba(0,255,225,.02);
}

.icon-box svg{
    width:30px;

    fill:none;

    stroke:#00ffe1;

    stroke-width:2;
}

/* TITLE */
.card h2{
    margin-top:26px;

    text-align:center;

    font-family:'Ethnocentric',sans-serif;

    letter-spacing:2px;

}

/* DESC */
.card p{

    color:#98a5ba;

    font-size:12px;

    line-height:2.1;

    letter-spacing:.3px;

    font-family:'Orbitron',sans-serif;
}

/* TEXT */
.card p{

/* =========================
   LOGIN BUTTON
========================= */

.btn{
    width:100%;
    height:74px;

    margin-top:30px;

    border:none;
    border-radius:18px;

    position:relative;

    overflow:hidden;

    cursor:pointer;

    background:
    linear-gradient(
        145deg,
        rgba(0,12,20,.98),
        rgba(0,18,30,.98)
    );

    border:2px solid rgba(0,255,225,.35);

    box-shadow:
    0 0 18px rgba(0,255,225,.12),
    0 0 40px rgba(0,255,225,.06),
    inset 0 0 20px rgba(0,255,225,.03);

    transition:.35s ease;
}

/* TOP RECTANGLE */
.btn::before{
    content:"";

    position:absolute;

    top:0;
    left:50%;

    transform:translateX(-50%);

    width:72%;
    height:3px;

    border-radius:20px;

    background:
    linear-gradient(
        90deg,
        transparent,
        #00ffe1,
        transparent
    );

    box-shadow:
    0 0 12px #00ffe1,
    0 0 22px rgba(0,255,225,.65);
}

/* MOVING LIGHT */
.btn::after{
    content:"";

    position:absolute;

    top:-120%;
    left:-40%;

    width:80%;
    height:320%;

    transform:rotate(18deg);

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(0,255,225,.08),
        transparent
    );

    animation:moveGlow 4.5s linear infinite;
}

@keyframes moveGlow{
    from{
        left:-70%;
    }
    to{
        left:130%;
    }
}
